repos:
  - repo: local
    hooks:
      - id: fix-headers
        name: Fix file headers
        entry: python -m fix_headers
        language: system
        types: [file]
        files: "\\.(py|sh|bash|zsh|fish|ps1|pl|rb|php|yaml|yml|toml|ini|cfg|conf|env|json5|hcl|tf|sql|lua)$"
        pass_filenames: true
        always_run: false
        args: ["--dry-run"]